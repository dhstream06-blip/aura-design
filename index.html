<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Design | Future Flyer Wall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="fx fx-1"></div>
    <div class="fx fx-2"></div>
    <div class="grid-overlay"></div>

    <main class="container">
      <section class="hero card">
        <div class="logo">AURA DESIGN</div>
        <h1>Future Flyer Wall</h1>
        <p>Einmal hochladen. Für alle sichtbar. Direkt über Supabase + GitHub Hosting.</p>
      </section>

      <section class="card upload">
        <h2>Flyer hochladen</h2>
        <p>Nur Bilddateien (PNG/JPG/WebP/GIF). Danach ist das Bild öffentlich sichtbar.</p>
        <input id="fileInput" type="file" accept="image/*" />
        <button id="uploadBtn">Upload</button>
        <p id="message" class="message"></p>
      </section>

      <section class="gallery-wrap">
        <h2>Public Gallery</h2>
        <div id="gallery" class="gallery"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
